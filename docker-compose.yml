version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ndip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ndip
      POSTGRES_PASSWORD: ndip_dev_password
      POSTGRES_DB: ndip
    ports:
      - "5432:5432"
    volumes:
      - ndip_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ndip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: ndip-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"

volumes:
  ndip_db_data:
